# Echo Loop Generator Configuration
# Based on "Echo: Rebuilding the Natural Reflex of Language" by H. Reeve
# T-S-N-S-T-S (Target → Silence → Native → Silence → Target → Silence)

# Mode: "audio" or "text" (optional — if omitted, auto-detected from paths;
#        if both audio and text paths exist, defaults to audio)
#        In batch mode, mode acts as a filter: "audio" scans for audio+lrc
#        pairs only, "text" scans for text files only, omitted = both.
# mode: "audio"

# File paths (CLI arguments override these)
paths:
  scan: ""               # folder path — triggers batch mode (processes all files)
  audio: ""              # source audio file — audio mode (mp3, wav, m4a, etc.)
  lrc: ""                # LRC subtitle file — audio mode
  text: ""               # bilingual text file — text-only mode
  output: ""             # output audio file (default: <input_name>_echo.<format>)
  output_lrc: ""         # output LRC file (default: same as output with .lrc)

timing:
  after_first_target: 0.8    # seconds of silence after first target audio
  after_native: 0.5          # seconds of silence after native audio
  after_second_target: 1.2   # seconds of silence after second target audio (loop gap)

tts:
  # Engine: "google" (default, paid, stable), "edge" (free), or
  # "openai" (paid, gpt-4o-mini-tts; understands math formulas).
  # Required environment per engine:
  #   google -> GOOGLE_APPLICATION_CREDENTIALS pointing to service account JSON
  #   openai -> OPENAI_API_KEY
  #   edge   -> none
  engine: "google"

  # --- edge-tts settings (used when engine: "edge") ---
  target_voice: "ja-JP-NanamiNeural"   # Target language TTS voice (text-only mode)
  native_voice: "zh-CN-XiaoxiaoNeural" # Native language TTS voice
  rate: "+0%"                          # Speech rate adjustment (-50% to +50%)
  pitch: "+0Hz"                        # Pitch adjustment

  # --- Google Cloud TTS settings (used when engine: "google") ---
  google:
    target_voice: "ja-JP-Neural2-B"           # Japanese male Neural2
    native_voice: "cmn-CN-Chirp3-HD-Kore"     # Chinese female Chirp3-HD
    speaking_rate: 1.0                         # 0.25 to 4.0
    pitch: 0.0                                 # -20.0 to 20.0 semitones (ignored by Chirp3-HD)

  # --- OpenAI TTS settings (used when engine: "openai") ---
  openai:
    model: "gpt-4o-mini-tts"
    voice: "coral"                     # alloy, ash, ballad, cedar, coral, echo, fable, nova, onyx, sage, shimmer, verse
    speed: 1.0                         # 0.25 to 4.0
    # instructions: natural language prompt controlling how the model speaks.
    # This is where the magic happens for math — tell it to read formulas naturally.
    instructions: "用中文自然地朗读，数学表达式要读成口语形式，比如2ⁿ读作2的n次方"

  # --- Volume control (applies to both engines) ---
  # Two modes — normalize takes priority if set.
  #
  # gain: fixed dB adjustment applied to every TTS clip.
  #   0  = no change (default)
  #  -6  = reduce by 6 dB (noticeably quieter)
  #  +3  = boost by 3 dB
  gain: -6

  # normalize: target average loudness (dBFS) for every TTS clip.
  #   Leave empty to disable. When set, each clip is individually
  #   scaled so its dBFS matches this value. Overrides 'gain'.
  #   Typical spoken audio sits around -18 to -24 dBFS.
  # normalize: -20
  normalize:

output:
  format: "m4a"
  bitrate: "192k"
  sample_rate: 44100

lrc:
  # Separator between target text and native text on a single line.
  # Default "|||" is chosen because it is extremely unlikely to appear in
  # natural-language content. Older files using "-" as the separator can
  # keep working by setting `delimiter: "-"` here, but this is fragile when
  # content itself contains hyphens (e.g. "two-three tree", "2-3").
  delimiter: "|||"
  split_strategy: "last"      # "last" = split on last delimiter, "first" = split on first


loop:
  # Loop variant: "full", "progressive", or "shadow"
  #   full:        T-S-N-S-T-S (default)
  #   progressive: T-S-N-S-T-S + T-S-silence-S-T-S (two passes per segment)
  #   shadow:      T-S-silence-S-T-S (native replaced with equal-length silence)
  variant: "progressive"